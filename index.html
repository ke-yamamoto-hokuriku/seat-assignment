<!DOCTYPE html>
<!-- 北陸大学座席指定システム  Ver.2.3  2026.04.07 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北陸大学座席指定システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;background:#eef0f6;min-height:100vh;padding:10px}
.header{background:linear-gradient(135deg,#1a237e,#303f9f);color:#fff;border-radius:10px;padding:10px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn-upload{border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-room{border-radius:6px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-room.active{background:#1a237e;color:#fff;border:2px solid #1a237e}
.btn-room.inactive{background:#f0f0f5;color:#333;border:2px solid #ddd}
.ctrl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.ctrl-label{font-size:10px;font-weight:600;color:#444;display:block;margin-bottom:2px}
.ctrl-select{font-size:12px;padding:4px 6px;border:1px solid #ccc;border-radius:6px;height:30px;background:#fff}
.ctrl-num{font-size:12px;padding:3px;border:1px solid #ccc;border-radius:6px;width:44px;height:30px;text-align:center}
.btn-export{background:#1a237e;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;height:32px;display:flex;align-items:center;gap:6px}
.stats{margin-top:6px;font-size:11px;color:#666;display:flex;gap:14px;flex-wrap:wrap}
.stats b{color:#333}
.warn{color:#c62828;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<div style="text-align:center;padding:12px;font-size:11px;color:#999;margin-top:4px">作者：山本啓一（北陸大学）｜Ver.2.3　2026.04.07</div>
<script src="rooms_physical.js"></script>
<script>
// PHYSICALから自動生成
var ROOM_LIST = Object.keys(PHYSICAL).filter(function(id) { var r=PHYSICAL[id]; return !r.parent && !r.sameAs; });
// パーティション子・sameAs子もリストに追加（generateRoom用）
var ALL_ROOMS = Object.keys(PHYSICAL).filter(function(id) { return PHYSICAL[id].tables; });

// 同型教室(sameAs)子・パーティション子の収集
var SAMEAS_CHILDREN = {}, PARTITION_CHILDREN = {};
Object.keys(PHYSICAL).forEach(function(id) {
  var r = PHYSICAL[id];
  if (r.sameAs) { if (!SAMEAS_CHILDREN[r.sameAs]) SAMEAS_CHILDREN[r.sameAs]=[]; SAMEAS_CHILDREN[r.sameAs].push(id); }
  if (r.parent) { if (!PARTITION_CHILDREN[r.parent]) PARTITION_CHILDREN[r.parent]=[]; PARTITION_CHILDREN[r.parent].push(id); }
});

// resolveSource: 物理データを持つ教室を返す
function resolveSource(rid) { return PHYSICAL[rid]; }

// ROOM_GROUPS自動生成: 親教室 + sameAs子をグループ化、パーティション子はI/IIサブボタン
var ROOM_GROUPS = ROOM_LIST.map(function(rid) {
  var rooms = [rid];
  var kids = PARTITION_CHILDREN[rid];
  if (kids) kids.forEach(function(k) { rooms.push(k); });
  var sames = SAMEAS_CHILDREN[rid];
  if (sames) sames.forEach(function(sid) {
    rooms.push(sid);
    var skids = PARTITION_CHILDREN[sid];
    if (skids) skids.forEach(function(k) { rooms.push(k); });
  });
  return { label: rid, rooms: rooms };
});

// ブロック内最大席数を適用してROOMを再生成
function applyMaxPerBlock(rid, maxPB) {
  var r = generateRoom(rid);
  if (maxPB <= 0) return r;
  var src = resolveSource(rid);
  var nBlocks = src.tables[0].length;
  var maxBlockW = [], blockStart = [], totalCols = 0;
  for (var b = 0; b < nBlocks; b++) {
    var maxW = 0;
    for (var row = 0; row < src.rows; row++) {
      var w = 0;
      for (var t = 0; t < src.tables[row][b].length; t++) w += src.tables[row][b][t];
      if (w > maxW) maxW = w;
    }
    maxBlockW.push(maxW);
  }
  for (var b = 0; b < nBlocks; b++) { blockStart.push(totalCols); totalCols += maxBlockW[b]; }
  var changed = false;
  for (var row = 0; row < r.rows; row++) {
    for (var b = 0; b < nBlocks; b++) {
      var seats = [];
      for (var c = blockStart[b]; c < blockStart[b] + maxBlockW[b]; c++)
        if (r.grid[row][c] > 0) seats.push(c);
      if (seats.length > maxPB) {
        var leanRight = (b % 2 === 0);
        var excess = seats.length - maxPB;
        for (var i = 0; i < excess; i++) {
          var idx = leanRight ? i : seats.length - 1 - i;
          r.grid[row][seats[idx]] = 0;
          changed = true;
        }
      }
    }
  }
  if (changed) {
    var n = 1;
    for (var c = 0; c < r.cols; c++)
      for (var row = 0; row < r.rows; row++)
        if (r.grid[row][c] > 0) r.grid[row][c] = n++;
    r.capacity = n - 1;
  }
  return r;
}

// 各教室のデフォルト最大席数を計算
function calcDefaultMax(rid) {
  var r = generateRoom(rid);
  var src = resolveSource(rid);
  var nBlocks = src.tables[0].length;
  var maxBlockW = [], blockStart = [], totalCols = 0;
  for (var b = 0; b < nBlocks; b++) {
    var maxW = 0;
    for (var row = 0; row < src.rows; row++) {
      var w = 0;
      for (var t = 0; t < src.tables[row][b].length; t++) w += src.tables[row][b][t];
      if (w > maxW) maxW = w;
    }
    maxBlockW.push(maxW);
  }
  for (var b = 0; b < nBlocks; b++) { blockStart.push(totalCols); totalCols += maxBlockW[b]; }
  var maxSeats = 0;
  for (var row = 0; row < r.rows; row++) {
    for (var b = 0; b < nBlocks; b++) {
      var cnt = 0;
      for (var c = blockStart[b]; c < blockStart[b] + maxBlockW[b]; c++)
        if (r.grid[row][c] > 0) cnt++;
      if (cnt > maxSeats) maxSeats = cnt;
    }
  }
  return maxSeats;
}

var DEFAULT_MAX = {};
ALL_ROOMS.forEach(function(id) { DEFAULT_MAX[id] = calcDefaultMax(id); });
// 201教室: 1ブロック最大5席ルールをデフォルトに
DEFAULT_MAX["201"] = 5;

var ROOMS = {};
ALL_ROOMS.forEach(function(id) { ROOMS[id] = applyMaxPerBlock(id, DEFAULT_MAX[id]); });

var R = React, ce = R.createElement;
var useState = R.useState, useRef = R.useRef, useMemo = R.useMemo;

var SW = 56, GW = 12, CH = 22, AG = 20, PAD = 24, HDR = 44;
function rowY(r) { return HDR + 6 + r * (CH * 2 + 4); }

function calcLayout(room) {
  var colIsSeat = [], c, r;
  for (c = 0; c < room.cols; c++) {
    var seat = false;
    for (r = 0; r < room.rows; r++) if (room.grid[r][c] > 0) { seat = true; break; }
    colIsSeat.push(seat);
  }
  var aisleAfter = new Set();
  if (room.innerAisles) room.innerAisles.forEach(function(a) { aisleAfter.add(a); });
  for (var i = 0; i < room.sections.length - 1; i++) aisleAfter.add(room.sections[i].e);
  var colXArr = [], colWArr = [], x = PAD;
  for (c = 0; c < room.cols; c++) {
    colXArr.push(x);
    var w = colIsSeat[c] ? SW : GW;
    colWArr.push(w);
    x += w;
    if (aisleAfter.has(c)) x += AG;
  }
  return { colIsSeat: colIsSeat, aisleAfter: aisleAfter, colXArr: colXArr, colWArr: colWArr,
           tw: x + PAD, th: rowY(room.rows - 1) + CH * 2 + PAD };
}

function lastDigit(id) {
  var m = id.match(/(\d)\D*$/);
  if (m) return parseInt(m[1]);
  var m2 = id.match(/(\d)/g);
  return m2 ? parseInt(m2[m2.length - 1]) : 0;
}

function doAssign(room, students, cfg, excludeCenter) {
  var seats = [], r, c;
  var excSet = new Set();
  if (excludeCenter && room.centerExclude) {
    room.centerExclude.forEach(function(p) { excSet.add(p[0]+","+p[1]); });
  }
  for (r = 0; r < room.rows; r++)
    for (c = 0; c < room.cols; c++)
      if (room.grid[r][c] > 0 && !excSet.has(r+","+c))
        seats.push({ r: r, c: c, n: room.grid[r][c] });
  var f = seats.filter(function(s) {
    return s.r >= cfg.skipFront && s.r <= room.rows - 1 - cfg.skipBack &&
           s.c >= cfg.skipLeft && s.c <= room.cols - 1 - cfg.skipRight;
  });
  if (cfg.colGap > 0 || cfg.rowGap > 0) {
    var rs = Array.from(new Set(f.map(function(s){return s.r}))).sort(function(a,b){return a-b});
    var cs = Array.from(new Set(f.map(function(s){return s.c}))).sort(function(a,b){return a-b});
    var kr = new Set(rs.filter(function(_,i){return i%(cfg.rowGap+1)===0}));
    var kc = new Set(cs.filter(function(_,i){return i%(cfg.colGap+1)===0}));
    f = f.filter(function(s){return kr.has(s.r) && kc.has(s.c)});
  }
  if (cfg.direction === "horizontal")
    f.sort(function(a,b){return a.r !== b.r ? a.r - b.r : cfg.leftRight === "left" ? a.c - b.c : b.c - a.c});
  else
    f.sort(function(a,b){ var d = cfg.leftRight==="left" ? a.c-b.c : b.c-a.c; return d!==0?d:a.r-b.r; });
  var ord;
  if (cfg.order === "oddEven")
    ord = students.filter(function(s){return lastDigit(s.id)%2===1}).concat(students.filter(function(s){return lastDigit(s.id)%2===0}));
  else if (cfg.order === "evenOdd")
    ord = students.filter(function(s){return lastDigit(s.id)%2===0}).concat(students.filter(function(s){return lastDigit(s.id)%2===1}));
  else if (cfg.order === "reverse")
    ord = students.slice().reverse();
  else ord = students.slice();
  var m = {}, len = Math.min(ord.length, f.length);
  for (var i = 0; i < len; i++) m[f[i].n] = ord[i];
  return { m: m, used: f.length, placed: len };
}

function parseFile(data) {
  try {
    var wb = XLSX.read(data, { type: "array" });
    var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    var hi = -1, ic = -1, nc = -1;
    for (var i = 0; i < Math.min(rows.length, 10); i++) {
      if (!rows[i]) continue;
      for (var j = 0; j < (rows[i].length||0); j++) {
        var v = String(rows[i][j]||"");
        if (v === "学籍番号") { hi = i; ic = j; }
        if (v === "学生氏名" || v === "氏名" || v === "名前" || v === "学生名") nc = j;
      }
      if (hi >= 0) break;
    }
    if (hi < 0) return { st: [], inf: {} };
    var st = [];
    for (var k = hi+1; k < rows.length; k++) {
      if (!rows[k]||!rows[k][ic]) continue;
      var id = String(rows[k][ic]).trim();
      var nm = nc>=0&&rows[k][nc] ? String(rows[k][nc]).trim() : "";
      if (id) st.push({ id: id, name: nm });
    }
    var r1 = rows[1]||[];
    return { st: st, inf: { sub: r1[4]||"", tea: r1[6]||"" } };
  } catch(e) { return { st: [], inf: {} }; }
}

function App() {
  var _s = useState("201"), roomId = _s[0], setRoomId = _s[1];
  var _st = useState([]), students = _st[0], setStudents = _st[1];
  var _inf = useState({}), info = _inf[0], setInfo = _inf[1];
  var _cfg = useState({
    direction:"horizontal",leftRight:"left",order:"sequential",
    colGap:0,rowGap:0,skipFront:0,skipBack:0,skipLeft:0,skipRight:0
  }), cfg = _cfg[0], setCfg = _cfg[1];
  var _exp = useState(null), exportImg = _exp[0], setExportImg = _exp[1];
  var _fn = useState(""), fileName = _fn[0], setFileName = _fn[1];
  var _exc = useState(false), excludeCenter = _exc[0], setExcludeCenter = _exc[1];
  var _disp = useState("id"), dispMode = _disp[0], setDispMode = _disp[1];
  var _mpb = useState(function(){ var o={}; ALL_ROOMS.forEach(function(id){o[id]=DEFAULT_MAX[id];}); return o; }), maxPerBlock = _mpb[0], setMaxPerBlock = _mpb[1];
  var svgRef = useRef(null), fileRef = useRef(null);

  var roomCaps = useMemo(function(){
    var caps = {};
    ALL_ROOMS.forEach(function(rid){
      var m = maxPerBlock[rid] || DEFAULT_MAX[rid];
      if (m === DEFAULT_MAX[rid]) { caps[rid] = ROOMS[rid].capacity; }
      else { caps[rid] = applyMaxPerBlock(rid, m).capacity; }
    });
    return caps;
  }, [maxPerBlock]);

  var curMax = maxPerBlock[roomId] || DEFAULT_MAX[roomId];
  var room = useMemo(function(){ return applyMaxPerBlock(roomId, curMax); }, [roomId, curMax]);
  var layout = useMemo(function(){ return calcLayout(room); }, [roomId, curMax]);
  var colXArr=layout.colXArr, colWArr=layout.colWArr, aisleAfter=layout.aisleAfter, tw=layout.tw, th=layout.th;
  var res = useMemo(function(){
    if (!students.length) return {m:{},used:0,placed:0};
    return doAssign(room, students, cfg, excludeCenter);
  }, [students, cfg, roomId, excludeCenter, curMax]);

  function onFile(e) {
    var file = e.target.files&&e.target.files[0]; if(!file) return;
    setFileName(file.name);
    var rd = new FileReader();
    rd.onload = function(ev) { var r=parseFile(new Uint8Array(ev.target.result)); setStudents(r.st); setInfo(r.inf); };
    rd.readAsArrayBuffer(file);
  }
  function up(k,v) { setCfg(function(p){ var o={}; for(var x in p) o[x]=p[x]; o[k]=v; return o; }); }
  function save() {
    var el=svgRef.current; if(!el) return;
    var xml=new XMLSerializer().serializeToString(el);
    var svg64=btoa(unescape(encodeURIComponent(xml)));
    var img=new Image();
    img.onload=function(){
      var cv=document.createElement("canvas"); cv.width=tw*2; cv.height=th*2;
      var ctx=cv.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.scale(2,2); ctx.drawImage(img,0,0,tw,th); setExportImg(cv.toDataURL("image/png"));
    };
    img.src="data:image/svg+xml;base64,"+svg64;
  }
  function download() { if(!exportImg)return; var a=document.createElement("a"); a.href=exportImg; a.download="座席表_"+room.name+(dispMode==="name"?"_氏名":"")+".png"; a.click(); }

  // ===== SVG cells =====
  var cells = [];
  var excSet = new Set();
  if (excludeCenter && room.centerExclude) {
    room.centerExclude.forEach(function(p){excSet.add(p[0]+","+p[1]);});
  }
  for (var r = 0; r < room.rows; r++) {
    for (var c = 0; c < room.cols; c++) {
      var sn = room.grid[r][c];
      if (sn === null) continue;
      var x = colXArr[c], w = colWArr[c], y = rowY(r);
      var isExcluded = excSet.has(r+","+c);
      if (sn > 0 && !isExcluded) {
        var st = res.m[sn];
        cells.push(ce("g",{key:"s"+sn},
          ce("text",{x:x+w/2,y:y+8,textAnchor:"middle",fontSize:"6",fill:"#999"},sn),
          ce("rect",{x:x,y:y+10,width:w,height:CH,rx:"2",
            fill:st?"#FFFDE7":"#fff",stroke:st?"#c5a000":"#ccc",strokeWidth:st?1.2:0.5}),
          st&&ce("text",{x:x+w/2,y:y+25,textAnchor:"middle",fontSize:dispMode==="name"?"5.5":"7",fontWeight:"bold",fill:"#1a237e"},dispMode==="name"?(st.name||st.id):st.id)
        ));
      } else if (sn > 0 && isExcluded) {
        cells.push(ce("g",{key:"x"+r+"_"+c},
          ce("rect",{x:x,y:y+10,width:w,height:CH,rx:"2",fill:"#f0f0f0",stroke:"#ccc",strokeWidth:0.5}),
          ce("line",{x1:x+4,y1:y+14,x2:x+w-4,y2:y+CH+6,stroke:"#bbb",strokeWidth:0.8}),
          ce("line",{x1:x+w-4,y1:y+14,x2:x+4,y2:y+CH+6,stroke:"#bbb",strokeWidth:0.8})
        ));
      } else {
        cells.push(ce("rect",{key:"g"+r+"_"+c,
          x:x+1,y:y+13,width:w-2,height:CH-6,rx:"1",
          fill:"#e0e3ea",stroke:"#ccd0d8",strokeWidth:0.3}));
      }
    }
  }
  // Row labels (left/right margins)
  var rowLabels = [];
  for (r = 0; r < room.rows; r++) {
    var y2 = rowY(r);
    rowLabels.push(ce("text",{key:"rl"+r,x:10,y:y2+25,textAnchor:"middle",fontSize:"9",fontWeight:"bold",fill:"#1a237e"},r+1));
    rowLabels.push(ce("text",{key:"rr"+r,x:tw-10,y:y2+25,textAnchor:"middle",fontSize:"9",fontWeight:"bold",fill:"#1a237e"},r+1));
  }
  // Aisle row numbers
  var aisleLabels = [], aisleArr = Array.from(aisleAfter).sort(function(a,b){return a-b});
  for (r = 0; r < room.rows; r++) {
    var ya = rowY(r);
    for (var ai = 0; ai < aisleArr.length; ai++) {
      var a = aisleArr[ai];
      var ax = colXArr[a] + colWArr[a] + AG/2;
      aisleLabels.push(ce("text",{key:"a"+ai+"_"+r,x:ax,y:ya+25,textAnchor:"middle",fontSize:"7",fill:"#bbb"},r+1));
    }
  }
  // Podium & section labels
  var secs = room.sections;
  var midSec = secs[Math.floor(secs.length/2)];
  var pcx = (colXArr[midSec.s]+colXArr[midSec.e]+colWArr[midSec.e])/2;
  var secLabels = secs.map(function(sec,si){
    var sx = (colXArr[sec.s]+colXArr[sec.e]+colWArr[sec.e])/2;
    var midIdx = Math.floor(secs.length/2);
    if (si === midIdx && info.sub) {
      return ce("g",{key:"sec"+si},
        ce("text",{x:sx,y:HDR-12,textAnchor:"middle",fontSize:"8",fill:"#333",fontWeight:"bold"},info.sub),
        ce("text",{x:sx,y:HDR-2,textAnchor:"middle",fontSize:"7",fill:"#666"},info.tea||"")
      );
    }
    return ce("text",{key:"sec"+si,x:sx,y:HDR-6,textAnchor:"middle",fontSize:"8",fill:"#666"},sec.name);
  });

  var cfgF = [["colGap","列間隔"],["rowGap","行間隔"],["skipFront","前skip"],["skipBack","後skip"],["skipLeft","左skip"],["skipRight","右skip"]];
  var oddC = students.filter(function(s){return lastDigit(s.id)%2===1}).length;
  var evenC = students.length - oddC;

  return ce("div",null,
    ce("div",{className:"header"},
      ce("div",null,
        ce("div",{style:{fontSize:17,fontWeight:700}},"北陸大学座席指定システム"),
        ce("div",{style:{fontSize:11,opacity:0.8}},room.name+"教室（定員"+room.capacity+"名）")),
      info.sub&&ce("div",{style:{textAlign:"right",fontSize:11}},ce("div",null,info.sub),ce("div",null,info.tea))),
    ce("div",{className:"card"},
      ce("div",{style:{display:"flex",flexWrap:"wrap",alignItems:"center",gap:12}},
        ce("input",{ref:fileRef,type:"file",accept:".xlsx,.xls",onChange:onFile,style:{display:"none"}}),
        ce("button",{className:"btn-upload",onClick:function(){fileRef.current&&fileRef.current.click()},
          style:{background:students.length?"#e8f5e9":"#e3f2fd",color:students.length?"#2e7d32":"#1565c0",
                 border:students.length?"2px solid #a5d6a7":"2px dashed #90caf9"}},
          ce("span",{style:{fontSize:20}},students.length?"✅":"📂"),
          students.length?"ファイル変更":"UNIPAファイルを選択"),
        students.length?
          ce("div",null,ce("div",{style:{fontSize:13,fontWeight:600,color:"#333"}},fileName),
            ce("div",{style:{fontSize:11,color:"#2e7d32"}},students.length+"名読込済（奇数末尾:"+oddC+"名/偶数末尾:"+evenC+"名）")):
          ce("div",{style:{fontSize:12,color:"#888"}},"UNIPAからダウンロードした履修者Excelファイル（.xlsx）")),
      ce("div",{style:{marginTop:10}},
        ce("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:6}},
          ce("span",{style:{fontSize:12,fontWeight:700,color:"#1a237e"}},"教室:")),
        ce("div",{style:{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}},
          ROOM_GROUPS.map(function(g,gi){
            var btns = g.rooms.map(function(rid){
              var cap=roomCaps[rid],sel=rid===roomId;
              var ph=PHYSICAL[rid],nm=ph.name;
              var label = ph.parent ? (ph.partitionHalf==="front"?"I":"II") : nm.replace(/教室/,"");
              var isPartBtn = !!ph.parent;
              return ce("button",{key:rid,className:"btn-room "+(sel?"active":"inactive"),
                style:isPartBtn?{fontSize:11,padding:"4px 8px"}:{},
                onClick:function(){setRoomId(rid);setExportImg(null);}},
                label,ce("span",{style:{fontSize:isPartBtn?8:9,opacity:0.7,marginLeft:3}},"("+cap+")"));
            });
            if(gi < ROOM_GROUPS.length-1) btns.push(ce("span",{key:"sep"+gi,style:{color:"#ccc",fontSize:16,margin:"0 2px"}},"|"));
            return btns;
          })))),
    ce("div",{className:"card"},
      ce("div",{className:"ctrl-row"},
        ce("div",null,ce("span",{className:"ctrl-label"},"詰め方"),
          ce("select",{className:"ctrl-select",value:cfg.direction,onChange:function(e){up("direction",e.target.value)}},
            ce("option",{value:"horizontal"},"横"),ce("option",{value:"vertical"},"縦"))),
        ce("div",null,ce("span",{className:"ctrl-label"},"左右"),
          ce("select",{className:"ctrl-select",value:cfg.leftRight,onChange:function(e){up("leftRight",e.target.value)}},
            ce("option",{value:"left"},"左から"),ce("option",{value:"right"},"右から"))),
        ce("div",null,ce("span",{className:"ctrl-label"},"並び方"),
          ce("select",{className:"ctrl-select",value:cfg.order,onChange:function(e){up("order",e.target.value)}},
            ce("option",{value:"sequential"},"順番（名簿順）"),ce("option",{value:"reverse"},"逆順（名簿逆順）"),ce("option",{value:"oddEven"},"奇数→偶数"),ce("option",{value:"evenOdd"},"偶数→奇数"))),
        cfgF.map(function(p){return ce("div",{key:p[0]},ce("span",{className:"ctrl-label"},p[1]),
          ce("input",{type:"number",className:"ctrl-num",min:0,max:25,value:cfg[p[0]],
            onChange:function(e){up(p[0],parseInt(e.target.value)||0)}}));}),
        ce("div",null,ce("span",{className:"ctrl-label"},"ブロック内最大席数"),
          ce("div",{style:{display:"flex",alignItems:"center",gap:4}},
            ce("input",{type:"number",className:"ctrl-num",min:1,max:20,value:curMax,
              onChange:function(e){var v=parseInt(e.target.value)||1;setMaxPerBlock(function(p){var o={};for(var k in p)o[k]=p[k];o[roomId]=v;return o;});setExportImg(null);}}),
            curMax !== DEFAULT_MAX[roomId] && ce("button",{style:{fontSize:9,background:"#eee",border:"1px solid #ccc",borderRadius:4,padding:"1px 6px",cursor:"pointer",lineHeight:"1.4"},
              onClick:function(){setMaxPerBlock(function(p){var o={};for(var k in p)o[k]=p[k];o[roomId]=DEFAULT_MAX[roomId];return o;});setExportImg(null);}},"↩"))),
        room.centerExclude&&ce("label",{style:{fontSize:12,display:"flex",alignItems:"center",gap:5,height:30,cursor:"pointer",userSelect:"none"}},
          ce("input",{type:"checkbox",checked:excludeCenter,onChange:function(e){setExcludeCenter(e.target.checked)},style:{width:16,height:16}}),
          "中央4席除外"),
        ce("div",null,ce("span",{className:"ctrl-label"},"表示"),
          ce("select",{className:"ctrl-select",value:dispMode,onChange:function(e){setDispMode(e.target.value);setExportImg(null);}},
            ce("option",{value:"id"},"学籍番号"),ce("option",{value:"name"},"学生氏名"))),
        ce("button",{className:"btn-export",onClick:save},"🖼️ 画像生成"),
        exportImg&&ce("button",{className:"btn-export",onClick:download,style:{background:"#2e7d32"}},"💾 ダウンロード")),
      students.length>0&&ce("div",{className:"stats"},
        ce("span",null,"受講者: ",ce("b",null,students.length)),
        ce("span",null,"使用席: ",ce("b",null,res.used)),
        ce("span",null,"配置済: ",ce("b",null,res.placed)),
        students.length>res.used&&ce("span",{className:"warn"},"⚠ "+(students.length-res.used)+"名分不足"),
        cfg.order!=="sequential"&&cfg.order!=="reverse"&&ce("span",{style:{color:"#1565c0"}},
          "（"+(cfg.order==="oddEven"?"奇数末尾→偶数末尾":"偶数末尾→奇数末尾")+"の順で配置）"),
        cfg.order==="reverse"&&ce("span",{style:{color:"#1565c0"}},"（名簿逆順で配置）"))),
    exportImg&&ce("div",{className:"card"},
      ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        ce("span",{style:{fontSize:13,fontWeight:700,color:"#1a237e"}},"生成画像（右クリック/長押しで保存）"),
        ce("button",{onClick:function(){setExportImg(null)},style:{background:"#eee",border:"none",borderRadius:4,padding:"3px 10px",fontSize:11,cursor:"pointer"}},"閉じる")),
      ce("div",{style:{border:"1px solid #ddd",borderRadius:6,overflow:"auto",maxHeight:500}},
        ce("img",{src:exportImg,alt:"座席表",style:{width:"100%",display:"block"}}))),
    ce("div",{className:"card",style:{padding:8,overflowX:"auto"}},
      ce("svg",{ref:svgRef,viewBox:"0 0 "+tw+" "+th,width:tw,height:th,xmlns:"http://www.w3.org/2000/svg",style:{display:"block",margin:"0 auto"}},
        ce("rect",{width:tw,height:th,fill:"#fff"}),
        ce("text",{x:tw-8,y:14,textAnchor:"end",fontSize:"9",fill:"#888"},"定員 "+room.capacity+"名"),
        ce("rect",{x:pcx-40,y:3,width:80,height:18,rx:3,fill:"#fff",stroke:"#999",strokeWidth:0.8}),
        ce("text",{x:pcx,y:15,textAnchor:"middle",fontSize:"10",fontWeight:"bold",fill:"#333"},room.podium||"教 卓"),
        secLabels,rowLabels,cells,aisleLabels)),
    students.length>0&&ce("details",{className:"card"},
      ce("summary",{style:{fontSize:12,fontWeight:600,cursor:"pointer"}},"名簿（"+students.length+"名）"),
      ce("div",{style:{marginTop:6,columns:"220px 4",fontSize:11}},
        students.map(function(s,i){
          var found=null,keys=Object.keys(res.m);
          for(var ki=0;ki<keys.length;ki++) if(res.m[keys[ki]].id===s.id){found=keys[ki];break;}
          var d=lastDigit(s.id);
          return ce("div",{key:i,style:{padding:"1px 4px",background:found?"#f1f8e9":"#fff3e0",borderRadius:2,marginBottom:1}},
            ce("b",null,s.id)," ",s.name," ",
            ce("span",{style:{color:"#aaa",fontSize:9}},"["+(d%2===1?"奇":"偶")+"]"),
            found&&ce("span",{style:{color:"#888",float:"right"}},"席"+found));
        })))
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(ce(App,null));
</script>
