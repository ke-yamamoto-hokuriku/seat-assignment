const CW = 52,
  CH = 22,
  EG = 20,
  SG = 24,
  PAD = 30,
  HDR = 46;
function colX(c, secs) {
  let g = 0;
  for (let i = 0; i < secs.length - 1; i++) {
    if (c > secs[i].e) g++;
  }
  return PAD + c * (CW + EG) + g * SG;
}
function rowYfn(r) {
  return HDR + 6 + r * (CH * 2 + 4);
}
function calcTW(room) {
  return colX(room.cols - 1, room.sections) + CW + PAD;
}
function calcTH(room) {
  return rowYfn(room.rows - 1) + CH * 2 + PAD;
}

// 学籍番号の末尾の数字を取得
function lastDigit(id) {
  const m = id.match(/(\d)\D*$/);
  if (m) return parseInt(m[1]);
  // 末尾が数字でない場合、最後に見つかる数字を使う
  const m2 = id.match(/(\d)/g);
  return m2 ? parseInt(m2[m2.length - 1]) : 0;
}
function doAssign(room, students, cfg, excludeCenter) {
  let seats = [];
  const excSet = new Set();
  if (excludeCenter && room.centerExclude) {
    room.centerExclude.forEach(p => excSet.add(p[0] + "," + p[1]));
  }
  for (let r = 0; r < room.rows; r++) for (let c = 0; c < room.cols; c++) if (room.grid[r][c] !== null && room.grid[r][c] > 0 && !excSet.has(r + "," + c)) seats.push({
    r,
    c,
    n: room.grid[r][c]
  });
  let f = seats.filter(s => s.r >= cfg.skipFront && s.r <= room.rows - 1 - cfg.skipBack && s.c >= cfg.skipLeft && s.c <= room.cols - 1 - cfg.skipRight);
  if (cfg.colGap > 0 || cfg.rowGap > 0) {
    const rs = [...new Set(f.map(s => s.r))].sort((a, b) => a - b);
    const cs = [...new Set(f.map(s => s.c))].sort((a, b) => a - b);
    const kr = new Set(rs.filter((_, i) => i % (cfg.rowGap + 1) === 0));
    const kc = new Set(cs.filter((_, i) => i % (cfg.colGap + 1) === 0));
    f = f.filter(s => kr.has(s.r) && kc.has(s.c));
  }
  if (cfg.direction === "horizontal") {
    f.sort((a, b) => a.r !== b.r ? a.r - b.r : cfg.leftRight === "left" ? a.c - b.c : b.c - a.c);
  } else {
    f.sort((a, b) => {
      const d = cfg.leftRight === "left" ? a.c - b.c : b.c - a.c;
      return d !== 0 ? d : a.r - b.r;
    });
  }
  let ord;
  if (cfg.order === "oddEven") {
    // 学籍番号末尾が奇数の学生を先に、偶数を後に（それぞれ元の順序を維持）
    const odd = students.filter(s => lastDigit(s.id) % 2 === 1);
    const even = students.filter(s => lastDigit(s.id) % 2 === 0);
    ord = [...odd, ...even];
  } else if (cfg.order === "evenOdd") {
    // 学籍番号末尾が偶数の学生を先に、奇数を後に
    const even = students.filter(s => lastDigit(s.id) % 2 === 0);
    const odd = students.filter(s => lastDigit(s.id) % 2 === 1);
    ord = [...even, ...odd];
  } else {
    ord = [...students];
  }
  const m = {};
  const len = Math.min(ord.length, f.length);
  for (let i = 0; i < len; i++) m[f[i].n] = ord[i];
  return {
    m,
    used: f.length,
    placed: len
  };
}
function parseFile(data) {
  try {
    const wb = XLSX.read(data, {
      type: "array"
    });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {
      header: 1
    });
    let hi = -1,
      ic = -1,
      nc = -1;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      if (!rows[i]) continue;
      for (let j = 0; j < (rows[i].length || 0); j++) {
        const v = String(rows[i][j] || "");
        if (v === "学籍番号") {
          hi = i;
          ic = j;
        }
        if (v === "学生氏名") nc = j;
      }
      if (hi >= 0) break;
    }
    if (hi < 0) return {
      st: [],
      inf: {}
    };
    const st = [];
    for (let k = hi + 1; k < rows.length; k++) {
      if (!rows[k] || !rows[k][ic]) continue;
      const id = String(rows[k][ic]).trim();
      const nm = nc >= 0 && rows[k][nc] ? String(rows[k][nc]).trim() : "";
      if (id) st.push({
        id,
        name: nm
      });
    }
    const r1 = rows[1] || [];
    return {
      st,
      inf: {
        sub: r1[4] || "",
        tea: r1[6] || ""
      }
    };
  } catch (e) {
    return {
      st: [],
      inf: {}
    };
  }
}

  const [exportImg, setExportImg] = useState(null);
  const [fileName, setFileName] = useState("");
  const [excludeCenter, setExcludeCenter] = useState(false);
  const svgRef = useRef(null);
  const fileRef = useRef(null);
  const room = ROOMS[roomId];
  const secs = room.sections;
  const tw = calcTW(room);
  const th = calcTH(room);
  const res = useMemo(() => {
    if (!students.length) return {
      m: {},
      used: 0,
      placed: 0

    return doAssign(room, students, cfg, excludeCenter);
  }, [students, cfg, roomId, excludeCenter]);
  function onFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    const rd = new FileReader();
    rd.onload = ev => {
      const r = parseFile(new Uint8Array(ev.target.result));
      setStudents(r.st);
      setInfo(r.inf);
    };
    rd.readAsArrayBuffer(file);
  }
  const up = (k, v) => setCfg(p => ({
    ...p,
    [k]: v
  }));
  function save() {
    const el = svgRef.current;
    if (!el) return;
    const xml = new XMLSerializer().serializeToString(el);
    const svg64 = btoa(unescape(encodeURIComponent(xml)));
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement("canvas");
      cv.width = tw * 2;
      cv.height = th * 2;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.scale(2, 2);
      ctx.drawImage(img, 0, 0, tw, th);
      setExportImg(cv.toDataURL("image/png"));
    };
    img.src = "data:image/svg+xml;base64," + svg64;
  }
  function download() {
    if (!exportImg) return;
    const a = document.createElement("a");
    a.href = exportImg;
    a.download = "座席表_" + room.name + ".png";
    a.click();
  }

  // Build SVG
  const cells = [];
  const ia = new Set(room.innerAisles || []);
