<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薬学部 手動座席指定システム</title>
<style>
  :root { --bg:#f5f0eb; --surface:#fff; --accent:#c85a2a; --accent-light:#f4d1b8; --seat-empty:#e8e0d8; --seat-assigned:#c85a2a; --seat-swap:#2a7fc8; --text:#2c2420; --text-light:#8a7e76; --border:#d4ccc4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:50; }
  header h1 { font-size:15px; font-weight:700; white-space:nowrap; }
  .room-select { font-size:13px; font-weight:600; color:var(--accent); padding:4px 8px; border:1px solid var(--border); border-radius:4px; background:var(--surface); }
  .toolbar { display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap; }
  .toolbar button,.toolbar label { font-size:11px; padding:5px 12px; border-radius:4px; border:1px solid var(--border); background:var(--surface); cursor:pointer; white-space:nowrap; }
  .toolbar button:hover,.toolbar label:hover { background:var(--accent-light); }
  .toolbar .btn-accent { background:var(--accent); color:#fff; border-color:var(--accent); }
  #fileInput { display:none; }
  .main { display:flex; flex:1; overflow:hidden; height:calc(100vh - 82px); }
  .sidebar { width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-header { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; }
  .sidebar-header span { font-size:11px; color:var(--text-light); font-weight:400; margin-left:6px; }
  .sidebar-scroll { flex:1; overflow-y:auto; }
  .room-area { flex:1; display:flex; justify-content:center; align-items:flex-start; padding:20px; overflow:auto; }
  .blackboard { fill:none; stroke:var(--accent); stroke-width:1.5; }
  .blackboard-text { font-size:13px; fill:var(--accent); text-anchor:middle; font-weight:700; }
  .block-label { font-size:10px; fill:var(--text-light); text-anchor:middle; }
  .row-label { font-size:9px; fill:var(--text-light); text-anchor:middle; dominant-baseline:middle; }
  .tbl-outline { fill:none; stroke:var(--border); stroke-width:1; }
  .seat-rect { stroke:none; cursor:pointer; transition:fill 0.1s; }
  .seat-rect.empty { fill:var(--seat-empty); }
  .seat-rect.allowed { fill:var(--accent-light); }
  .seat-rect.allowed:hover { fill:#e8b890; }
  .seat-rect.assigned { fill:#fff; stroke:var(--accent); stroke-width:1.5; }
  .seat-rect.assigned:hover { fill:#fef5f0; }
  .seat-rect.swap { fill:var(--seat-swap); }
  .seat-rect.moved { stroke:#c62828; stroke-width:2.5; }
  .divider { stroke:var(--border); stroke-width:0.5; }
  .s-top { font-size:9px; fill:var(--accent); text-anchor:middle; pointer-events:none; font-weight:700; }
  .s-bot { font-size:10px; fill:var(--accent); text-anchor:middle; pointer-events:none; font-weight:700; }
  .s-num { font-size:11px; fill:var(--accent); text-anchor:middle; dominant-baseline:middle; pointer-events:none; font-weight:700; }
  
  
  
  .roster-table { width:100%; border-collapse:collapse; font-size:11px; background:var(--surface); }
  .roster-table th { background:#f0ebe5; padding:4px 6px; text-align:left; font-weight:600; font-size:10px; color:var(--text-light); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1; }
  .roster-table td { padding:3px 6px; border-bottom:1px solid #f0ebe5; }
  .roster-table tr:hover { background:#faf6f2; }
  .roster-table tr.asgn td:last-child { color:var(--accent); font-weight:600; }
  .roster-table tr.sel { background:#e0edfa !important; }
  .sid { font-family:monospace; font-size:12px; }
  .statusbar { background:var(--surface); border-top:1px solid var(--border); padding:6px 20px; font-size:11px; color:var(--text-light); display:flex; gap:20px; flex-shrink:0; }
  .statusbar strong { color:var(--text); }
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:100; justify-content:center; align-items:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border-radius:8px; padding:24px; min-width:320px; box-shadow:0 8px 32px rgba(0,0,0,.2); }
  .modal h2 { font-size:15px; margin-bottom:16px; }
  .modal-btn { display:block; width:100%; padding:12px; margin-bottom:8px; border:1px solid var(--border); border-radius:6px; background:var(--surface); cursor:pointer; font-size:13px; text-align:left; }
  .modal-btn:hover { background:var(--accent-light); }
  .modal-btn strong { display:block; font-size:14px; margin-bottom:2px; }
  .modal-btn span { color:var(--text-light); font-size:11px; }
  @media print { header,.toolbar,.statusbar{display:none!important} .room-area{padding:10px} body{background:#fff} }
</style>
</head>
<body>
<header>
  <h1>薬学部 座席指定</h1>
  <select class="room-select" id="roomSelect" onchange="switchRoom(this.value)"></select>
  <div class="toolbar">
    <label for="fileInput">📂 名簿Excel</label><input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    <button onclick="clearAll()">🗑 リセット</button>
    <button onclick="undoLast()">↩ 取消</button>
    <button onclick="confirmAll()" id="btnConfirm" style="display:none">✓ 確定</button>
    <button class="btn-accent" onclick="downloadPNG()">📷 画像DL</button>
  </div>
</header>
<div class="main">
  <div class="sidebar" id="rosterSec">
    <div class="sidebar-header">名簿 <span id="rosterCnt"></span></div>
    <div class="sidebar-scroll">
      <table class="roster-table"><thead><tr><th>No.</th><th>学籍番号</th><th>氏名</th><th>席</th></tr></thead><tbody id="rosterBody"></tbody></table>
    </div>
  </div>
  <div class="room-area"><svg id="roomSvg"></svg></div>
</div>
<div class="statusbar">
  <span>着席可能: <strong id="stT">0</strong></span>
  <span>配席済: <strong id="stA">0</strong></span>
  <span>未配席: <strong id="stR">0</strong></span>
  <span id="stI" style="margin-left:auto;color:var(--accent)"></span>
</div>
<div class="modal-overlay" id="modeModal"><div class="modal"><h2>配席方法を選択</h2>
  <button class="modal-btn" onclick="doAuto('left')"><strong>← 自動配置（左から）</strong><span>通し番号1から順に自動配席</span></button>
  <button class="modal-btn" onclick="doAuto('right')"><strong>→ 自動配置（右から）</strong><span>通し番号を逆順に自動配席</span></button>
  <button class="modal-btn" onclick="doManual()"><strong>✋ 手動配置</strong><span>学生を選択→席をクリック</span></button>
</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const ROOMS={"202PN":{id:"202PN",blocks:[
  {name:"左",rows:[{chairs:4,allowed:[1,4]},{chairs:7,allowed:[]},{chairs:7,allowed:[4,7]},{chairs:7,allowed:[4,7]},{chairs:8,allowed:[1]},{chairs:9,allowed:[7]},{chairs:10,allowed:[1,4,10]},{chairs:10,allowed:[1,4,10]},{chairs:5,allowed:[2]}]},
  {name:"中央",rows:[{chairs:6,allowed:[1,6]},{chairs:6,allowed:[1,6]},{chairs:7,allowed:[4]},{chairs:7,allowed:[4]},{chairs:8,allowed:[1,8]},{chairs:9,allowed:[]},{chairs:10,allowed:[1,4,7,10]},{chairs:10,allowed:[1,4,7,10]},{chairs:11,allowed:[]},{chairs:12,allowed:[1,7,12]},{chairs:11,allowed:[4,9]}]},
  {name:"右",rows:[{chairs:4,allowed:[1,4]},{chairs:7,allowed:[]},{chairs:7,allowed:[1,4]},{chairs:7,allowed:[1,4]},{chairs:8,allowed:[8]},{chairs:9,allowed:[3]},{chairs:10,allowed:[1,7,10]},{chairs:10,allowed:[1,7,10]},{chairs:5,allowed:[4]}]}
]}};
let curRoom="202PN";
function R(){return ROOMS[curRoom]}
let students=[],selIdx=null,asgn={},hist=[],mode='manual',swapId=null,moved=new Set();

function populateRoomSelect(){document.getElementById('roomSelect').innerHTML=Object.keys(ROOMS).map(id=>`<option value="${id}" ${id===curRoom?'selected':''}>${id}</option>`).join('')}
function switchRoom(id){if(Object.keys(asgn).length>0&&!confirm('配席リセットしますか？')){document.getElementById('roomSelect').value=curRoom;return}curRoom=id;asgn={};hist=[];selIdx=students.length?0:null;swapId=null;mode='manual';renderRoom();renderRoster()}
function allowedIds(){const ids=[];for(let bi=0;bi<R().blocks.length;bi++){const bl=R().blocks[bi];for(let ri=0;ri<bl.rows.length;ri++){const row=bl.rows[ri];if(!row.allowed)continue;for(const cn of row.allowed)ids.push(`${bi}-${ri}-${cn-1}`)}}return ids}

// ===== Render =====
const BIG_W=80, SMALL_W=20, TBL_H=42, RG=6, AISLE=70, CHAIR_GAP=3, TOP=55;

function rowTotalW(row){
  let w=0;
  for(let ci=0;ci<row.chairs;ci++){
    const isA=row.allowed&&row.allowed.includes(ci+1);
    w+=(isA?BIG_W:SMALL_W);
    if(ci<row.chairs-1) w+=CHAIR_GAP;
  }
  return w;
}

function renderRoom(){
  const svg=document.getElementById('roomSvg');
  // Compute max row widths per block
  const blocks=R().blocks;
  const bMaxW=blocks.map(b=>Math.max(...b.rows.map(r=>rowTotalW(r))));
  const cMaxW=bMaxW[1], lMaxW=bMaxW[0], rMaxW=bMaxW[2];
  const tW=lMaxW+AISLE+cMaxW+AISLE+rMaxW;
  const mxR=Math.max(...blocks.map(b=>b.rows.length));
  const tH=TOP+mxR*(TBL_H+RG)+20;
  svg.setAttribute('width',tW+40);svg.setAttribute('height',tH);svg.setAttribute('viewBox',`0 0 ${tW+40} ${tH}`);svg.innerHTML='';
  const ox=20, cL=ox+lMaxW+AISLE, cR=cL+cMaxW;

  // Room name
  const bbX=cL+(cMaxW-140)/2;
  svg.innerHTML+=`<rect class="blackboard" x="${bbX}" y="5" width="140" height="28" rx="3"/>`;
  svg.innerHTML+=`<text class="blackboard-text" x="${bbX+70}" y="24">${R().id}</text>`;
  svg.innerHTML+=`<text class="block-label" x="${ox+lMaxW/2}" y="${TOP-10}">${blocks[0].name}</text>`;
  svg.innerHTML+=`<text class="block-label" x="${cL+cMaxW/2}" y="${TOP-10}">${blocks[1].name}</text>`;
  svg.innerHTML+=`<text class="block-label" x="${cR+AISLE+rMaxW/2}" y="${TOP-10}">${blocks[2].name}</text>`;

  // Straight diagonal aisle lines (fan shape)
  // Center block row edges
  const cEdges=blocks[1].rows.map(r=>{const rw=rowTotalW(r);const lx=cL+(cMaxW-rw)/2;return{left:lx,right:lx+rw}});
  // Fan line: straight diagonal that clears all center rows + margin
  const minCLeft=Math.min(...cEdges.map(e=>e.left));
  const maxCRight=Math.max(...cEdges.map(e=>e.right));
  // Fan from first row edge to beyond the widest point, with extra spread
  const fanMargin=35;
  const fanEndLeft=minCLeft-fanMargin;
  const fanEndRight=maxCRight+fanMargin;
  function aisleLeft(ri){return firstCE.left+(fanEndLeft-firstCE.left)*ri/(mxR-1)}
  function aisleRight(ri){return firstCE.right+(fanEndRight-firstCE.right)*ri/(mxR-1)}
  const firstCE=cEdges[0];

  // Seq numbers: left block → center block → right block, each top to bottom
  let sMap={},sq=1;
  for(let bi=0;bi<blocks.length;bi++){const bl=blocks[bi];for(let ri=0;ri<bl.rows.length;ri++){const row=bl.rows[ri];if(!row.allowed)continue;for(const cn of row.allowed)sMap[`${bi}-${ri}-${cn-1}`]=sq++}}

  blocks.forEach((block,bi)=>{block.rows.forEach((row,ri)=>{
    const rw=rowTotalW(row);
    const aL=aisleLeft(ri), aR=aisleRight(ri);
    const rX=bi===0?(aL-AISLE-rw):bi===2?(aR+AISLE):cL+(cMaxW-rw)/2;
    const rY=TOP+ri*(TBL_H+RG);

    // Table outline
    svg.innerHTML+=`<rect class="tbl-outline" x="${rX}" y="${rY}" width="${rw}" height="${TBL_H}" rx="2"/>`;

    // Individual seats
    let cx=rX;
    for(let ci=0;ci<row.chairs;ci++){
      const sid=`${bi}-${ri}-${ci}`;
      const isA=row.allowed&&row.allowed.includes(ci+1);
      const w=isA?BIG_W:SMALL_W;
      const a=asgn[sid];
      const isMoved=moved.has(sid);
      const cls=((sid===swapId)?'seat-rect swap':a?'seat-rect assigned':isA?'seat-rect allowed':'seat-rect empty')+(isMoved?' moved':'');
      svg.innerHTML+=`<rect class="${cls}" x="${cx+0.5}" y="${rY+0.5}" width="${w-1}" height="${TBL_H-1}" rx="1" onclick="onSeatClick('${sid}')"/>`;

      const mx=cx+w/2, my=rY+TBL_H/2;
      if(a){
        const sn=sMap[sid]||'';
        svg.innerHTML+=`<text class="s-top" x="${mx}" y="${my-8}" dominant-baseline="middle">${sn}</text>`;
        svg.innerHTML+=`<text class="s-bot" x="${mx}" y="${my+9}" dominant-baseline="middle">${a.studentId}</text>`;
      } else if(isA&&sMap[sid]){
        svg.innerHTML+=`<text class="s-num" x="${mx}" y="${my}">${sMap[sid]}</text>`;
      }

      // Divider line (except last)
      if(ci<row.chairs-1){
        svg.innerHTML+=`<line class="divider" x1="${cx+w}" y1="${rY+1}" x2="${cx+w}" y2="${rY+TBL_H-1}"/>`;
      }
      cx+=w+CHAIR_GAP;
    }
  })});

  // Row numbers on straight diagonal aisle lines
  for(let ri=0;ri<mxR;ri++){const ry=TOP+ri*(TBL_H+RG)+TBL_H/2;const aL=aisleLeft(ri),aR=aisleRight(ri);svg.innerHTML+=`<text class="row-label" x="${aL-AISLE/2}" y="${ry}">${ri+1}</text>`;svg.innerHTML+=`<text class="row-label" x="${aR+AISLE/2}" y="${ry}">${ri+1}</text>`}
  document.getElementById('stT').textContent=Object.keys(sMap).length;updateStats();
}

// ===== Click / State =====
function onSeatClick(sid){
  const[bi,ri,ci]=sid.split('-').map(Number);const row=R().blocks[bi].rows[ri];const isA=row.allowed&&row.allowed.includes(ci+1);
  if(mode==='adjust'){
    if(!swapId){if(asgn[sid]){swapId=sid;renderRoom();updateStats()}}
    else if(swapId===sid){swapId=null;renderRoom();updateStats()}
    else{const src=asgn[swapId],dst=asgn[sid];if(dst){asgn[swapId]=dst;asgn[sid]=src;moved.add(swapId);moved.add(sid);hist.push({type:'swap',s1:swapId,s2:sid})}else if(isA){asgn[sid]=src;delete asgn[swapId];moved.add(sid);moved.add(swapId);hist.push({type:'move',from:swapId,to:sid,data:src})}swapId=null;showConfirmBtn();renderRoom();renderRoster()}
    return;
  }
  if(asgn[sid]){const p=asgn[sid];delete asgn[sid];hist.push({type:'unassign',seatId:sid,data:p});renderRoom();renderRoster();return}
  if(!isA||selIdx===null)return;const st=students[selIdx];
  const ex=Object.keys(asgn).find(k=>asgn[k].studentId===st.id);if(ex)delete asgn[ex];
  asgn[sid]={studentId:st.id,studentName:st.name};hist.push({type:'assign',seatId:sid,studentIdx:selIdx});
  let next=null;for(let i=selIdx+1;i<students.length;i++){if(!isAsgd(i)){next=i;break}}selIdx=next;
  renderRoom();renderRoster();
}
function isAsgd(i){return Object.values(asgn).some(a=>a.studentId===students[i].id)}
function seatLbl(id){const ids=allowedIds();for(const[sid,d]of Object.entries(asgn)){if(d.studentId===id){const i=ids.indexOf(sid);return i>=0?String(i+1):''}}return''}

function renderRoster(){
  const sec=document.getElementById('rosterSec'),body=document.getElementById('rosterBody');
  
  const ac=students.filter((_,i)=>isAsgd(i)).length;
  document.getElementById('rosterCnt').textContent=`(${ac}/${students.length})`;
  body.innerHTML=students.map((st,i)=>{const sl=seatLbl(st.id);const cls=(sl?'asgn':'')+(i===selIdx?' sel':'');return`<tr class="${cls}" style="cursor:pointer" onclick="selectStudent(${i})"><td>${i+1}</td><td class="sid">${st.id}</td><td>${st.name}</td><td>${sl?'席 '+sl:''}</td></tr>`}).join('');
  updateStats();
}
function selectStudent(i){if(mode==='adjust')return;selIdx=(selIdx===i)?null:i;renderRoster()}
function updateStats(){
  const t=Object.keys(asgn).length,r=students.length-t;
  document.getElementById('stA').textContent=t;document.getElementById('stR').textContent=Math.max(0,r);
  const inst=document.getElementById('stI');
  if(!students.length)inst.textContent='名簿Excelを読み込んでください';
  else if(mode==='adjust'&&swapId)inst.textContent='移動先 or 交換相手の席をクリック';
  else if(mode==='adjust')inst.textContent='席をクリックして移動・交換';
  else if(selIdx!==null)inst.textContent='配置: '+students[selIdx].id+' → 席をクリック';
  else if(r>0)inst.textContent='名簿から学生をクリックして選択';
  else inst.textContent='✓ 全員配席完了';
}

document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;const reader=new FileReader();
  reader.onload=function(ev){const wb=XLSX.read(ev.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{header:1});
  let hR=-1,iC=-1,nC=-1;for(let r=0;r<Math.min(data.length,10);r++){const row=data[r];if(!row)continue;for(let c=0;c<row.length;c++){const v=String(row[c]||'');if(v.includes('学籍番号'))iC=c;if(/^(学生氏名|氏名|名前|学生名)$/.test(v))nC=c}if(iC>=0){hR=r;break}}
  if(hR<0){alert('学籍番号列が見つかりません');return}students=[];for(let r=hR+1;r<data.length;r++){const row=data[r];if(!row||!row[iC])continue;const id=String(row[iC]).trim(),nm=nC>=0&&row[nC]?String(row[nC]).trim():'';if(id)students.push({id,name:nm})}
  asgn={};hist=[];selIdx=null;swapId=null;renderRoom();renderRoster();document.getElementById('modeModal').classList.add('show')};reader.readAsArrayBuffer(file);e.target.value='';});

function doAuto(dir){document.getElementById('modeModal').classList.remove('show');asgn={};moved.clear();let ids=allowedIds();if(dir==='right')ids.reverse();const n=Math.min(students.length,ids.length);for(let i=0;i<n;i++)asgn[ids[i]]={studentId:students[i].id,studentName:students[i].name};mode='adjust';selIdx=null;swapId=null;renderRoom();renderRoster()}
function doManual(){document.getElementById('modeModal').classList.remove('show');mode='manual';selIdx=students.length?0:null;swapId=null;renderRoom();renderRoster()}
function clearAll(){if(Object.keys(asgn).length>0&&!confirm('配席リセット？'))return;asgn={};hist=[];swapId=null;moved.clear();showConfirmBtn();if(students.length)selIdx=0;mode='manual';renderRoom();renderRoster()}
function undoLast(){const l=hist.pop();if(!l)return;if(l.type==='assign'){delete asgn[l.seatId];selIdx=l.studentIdx}else if(l.type==='unassign')asgn[l.seatId]=l.data;else if(l.type==='swap'){const t=asgn[l.s1];asgn[l.s1]=asgn[l.s2];asgn[l.s2]=t;moved.delete(l.s1);moved.delete(l.s2)}else if(l.type==='move'){asgn[l.from]=l.data;delete asgn[l.to];moved.delete(l.from);moved.delete(l.to)}swapId=null;showConfirmBtn();renderRoom();renderRoster()}
function showConfirmBtn(){document.getElementById('btnConfirm').style.display=moved.size>0?'':'none'}
function confirmAll(){moved.clear();showConfirmBtn();renderRoom()}
function downloadPNG(){
  const svgEl=document.getElementById('roomSvg');
  const clone=svgEl.cloneNode(true);
  // Inline CSS styles into SVG for export
  const css=`
    .blackboard{fill:none;stroke:#c85a2a;stroke-width:1.5}
    .blackboard-text{font-size:13px;fill:#c85a2a;text-anchor:middle;font-weight:700;font-family:sans-serif}
    .block-label{font-size:10px;fill:#8a7e76;text-anchor:middle;font-family:sans-serif}
    .row-label{font-size:9px;fill:#8a7e76;text-anchor:middle;dominant-baseline:middle;font-family:sans-serif}
    .tbl-outline{fill:none;stroke:#d4ccc4;stroke-width:1}
    .seat-rect.empty{fill:#e8e0d8}
    .seat-rect.allowed{fill:#f4d1b8}
    .seat-rect.assigned{fill:#fff;stroke:#c85a2a;stroke-width:1.5}
    .seat-rect.swap{fill:#2a7fc8}
    .seat-rect.moved{stroke:#c62828;stroke-width:2.5}
    .divider{stroke:#d4ccc4;stroke-width:0.5}
    .s-top{font-size:9px;fill:#c85a2a;text-anchor:middle;font-weight:700;font-family:sans-serif}
    .s-bot{font-size:10px;fill:#c85a2a;text-anchor:middle;font-weight:700;font-family:sans-serif}
    .s-num{font-size:11px;fill:#c85a2a;text-anchor:middle;dominant-baseline:middle;font-weight:700;font-family:sans-serif}
  `;
  const styleEl=document.createElementNS('http://www.w3.org/2000/svg','style');
  styleEl.textContent=css;
  clone.insertBefore(styleEl,clone.firstChild);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  const svgData=new XMLSerializer().serializeToString(clone);
  const w=+svgEl.getAttribute('width'), h=+svgEl.getAttribute('height');
  const canvas=document.createElement('canvas');
  const scale=2;
  canvas.width=w*scale;canvas.height=h*scale;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  const img=new Image();
  img.onload=function(){
    ctx.drawImage(img,0,0,w*scale,h*scale);
    const a=document.createElement('a');
    a.download=R().id+'_seating.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  };
  img.onerror=function(e){console.error('SVG load error',e);alert('画像生成に失敗しました')};
  const blob=new Blob([svgData],{type:'image/svg+xml;charset=utf-8'});
  img.src=URL.createObjectURL(blob);
}

populateRoomSelect();renderRoom();updateStats();
</script>
</body>
